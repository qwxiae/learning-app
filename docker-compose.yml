services:
  web:
    env_file: .env
    environment:
      - ENVIRONMENT=production
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    ports: 
      - "8000:8000"
    volumes: 
      - .:/app 
    depends_on:
      db:
        condition: service_healthy
      
  db:
    image: postgres:14.6-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

