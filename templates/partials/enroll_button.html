{% if user.is_authenticated %}
    {% if is_enrolled %}
        <form hx-post="{% url 'courses:unenroll' slug=course.slug %}"
              hx-target="#enroll-section"
              hx-swap="innerHTML">
            {% csrf_token %}
            <button class="btn btn-ghost" style="width:100%">
                ✓ Enrolled — Unenroll
            </button>
        </form>
    {% else %}
        <form hx-post="{% url 'courses:enroll' slug=course.slug %}"
              hx-target="#enroll-section"
              hx-swap="innerHTML">
            {% csrf_token %}
            <button class="btn btn-primary" style="width:100%">
                Enroll
            </button>
        </form>
    {% endif %}
{% else %}
    <a href="{% url 'users:login' %}?next={{ request.path }}"
       class="btn btn-primary"
       style="width:100%; text-align:center">
        Login to Enroll
    </a>
{% endif %}
